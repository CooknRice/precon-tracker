name: Deal alerts

# Runs after the price scraper. Compares yesterday's prices to today's and
# opens a GitHub Issue when any deck drops by more than DROP_THRESHOLD percent.
# Optional: also pings a Discord webhook (set DISCORD_WEBHOOK_URL secret).

on:
  workflow_run:
    workflows: ["Scrape precon prices"]
    types: [completed]

permissions:
  contents: read
  issues: write

jobs:
  alert:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect price drops
        id: detect
        env:
          DROP_THRESHOLD: '15'  # percent
        run: |
          python - <<'PY'
          import json, os, subprocess, sys
          threshold = float(os.environ["DROP_THRESHOLD"])

          # Pull yesterday's prices_history.json (HEAD~1) for comparison.
          try:
              prev_blob = subprocess.check_output(
                  ["git", "show", "HEAD~1:prices_history.json"],
                  stderr=subprocess.DEVNULL,
              ).decode()
              prev = json.loads(prev_blob).get("decks", {})
          except subprocess.CalledProcessError:
              prev = {}

          curr = json.load(open("prices_history.json")).get("decks", {})
          decks = {d["id"]: d for d in json.load(open("decks.json"))}

          drops = []
          for did, series in curr.items():
              if len(series) < 2:
                  continue
              today = series[-1].get("tcg")
              # Compare to whatever the most recent prior entry was.
              yesterday = series[-2].get("tcg") if len(series) >= 2 else None
              if today is None or yesterday is None or yesterday <= 0:
                  continue
              pct = (yesterday - today) / yesterday * 100
              if pct >= threshold:
                  d = decks.get(did, {})
                  drops.append({
                      "id": did,
                      "name": d.get("name", did),
                      "set": d.get("set", ""),
                      "before": yesterday,
                      "after": today,
                      "pct": pct,
                  })

          drops.sort(key=lambda x: -x["pct"])
          if not drops:
              print("No drops above threshold.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as gh:
                  gh.write("found=0\n")
              sys.exit(0)

          print(f"Found {len(drops)} drops:")
          lines = []
          for d in drops:
              lines.append(f"- **{d['name']}** ({d['set']}) — ${d['before']:.2f} → **${d['after']:.2f}** ({d['pct']:.0f}% off)")
              print(f"  {d['name']}: ${d['before']:.2f} -> ${d['after']:.2f} ({d['pct']:.0f}%)")

          body = "Daily price-drop alert. The following precons dropped by more than {0}% since the last scrape:\n\n{1}\n\n_Auto-generated by deal-alerts.yml_".format(int(threshold), "\n".join(lines))
          title = f"Price drops · {len(drops)} deck{'s' if len(drops) != 1 else ''}"

          with open("alert_body.md", "w") as f:
              f.write(body)
          with open(os.environ["GITHUB_OUTPUT"], "a") as gh:
              gh.write(f"found={len(drops)}\n")
              gh.write(f"title={title}\n")
          PY

      - name: Open GitHub Issue
        if: steps.detect.outputs.found != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "${{ steps.detect.outputs.title }}" \
            --body-file alert_body.md \
            --label deal-alert

      - name: Discord webhook (optional)
        if: steps.detect.outputs.found != '0' && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          BODY=$(jq -Rs '{content: .}' < alert_body.md)
          curl -fsS -X POST -H "Content-Type: application/json" -d "$BODY" "$DISCORD_WEBHOOK_URL"
