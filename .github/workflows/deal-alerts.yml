name: Deal alerts

# Runs after the price scraper. Compares yesterday's prices to today's and
# opens a GitHub Issue when any deck drops by more than DROP_THRESHOLD percent.
# Optional: also pings a Discord webhook (set DISCORD_WEBHOOK_URL secret).

on:
  workflow_run:
    workflows: ["Scrape precon prices"]
    types: [completed]

permissions:
  contents: read
  issues: write

# Job-/workflow-level env. DISCORD_WEBHOOK_URL must live here (not in the
# step's own env) so a step-level `if:` can read it — a step `if:` cannot see
# that same step's env block. Secrets can't be referenced directly in `if:`,
# so this indirection through env is the standard pattern.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

jobs:
  alert:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect price drops & personalized alerts
        id: detect
        env:
          DROP_THRESHOLD: '15'         # global: alert any deck dropping >= this %
          WATCHED_DROP_THRESHOLD: '5'  # watched decks: more sensitive
        run: |
          python - <<'PY'
          import json, os, sys
          from datetime import date
          gthresh = float(os.environ["DROP_THRESHOLD"])
          wthresh = float(os.environ["WATCHED_DROP_THRESHOLD"])
          today_iso = date.today().isoformat()

          # History entries are appended only when the price CHANGES, so the
          # series is sparse. We make the comparison date-aware:
          #   - "today" = the last entry, but ONLY if it's actually from today's
          #     run (else there's no fresh data point — skip the deck).
          #   - "yesterday" = the most recent entry strictly before today.
          def today_tcg(series):
              if series and series[-1].get("date") == today_iso:
                  return series[-1].get("tcg")
              return None
          def prev_tcg(series):
              for e in reversed(series[:-1]) if series else []:
                  if e.get("tcg") is not None:
                      return e.get("tcg")
              return None
          def prev_date(series):
              return series[-2].get("date") if len(series) >= 2 else None

          curr = json.load(open("prices_history.json")).get("decks", {})
          decks = {d["id"]: d for d in json.load(open("decks.json"))}

          # Personalized config (optional file). watched = ids; targets = id->price.
          watched, targets = [], {}
          try:
              cfg = json.load(open("targets.json"))
              watched = cfg.get("watched") or []
              targets = cfg.get("targets") or {}
          except (FileNotFoundError, json.JSONDecodeError):
              pass
          watched = set(watched)

          def name_of(did): return decks.get(did, {}).get("name", did)
          def set_of(did): return decks.get(did, {}).get("set", "")

          global_drops, watched_drops, target_hits = [], [], []

          for did, series in curr.items():
              today = today_tcg(series)        # None unless there's a fresh entry today
              # Target hit: only fire on a FRESH price at/below the user's target.
              tgt = targets.get(did)
              if today is not None and tgt is not None and today <= float(tgt):
                  target_hits.append({"id": did, "name": name_of(did), "set": set_of(did),
                                      "price": today, "target": float(tgt)})
              # Drop detection needs a fresh today price + a prior data point.
              if today is None:
                  continue
              yest = prev_tcg(series)
              if yest is None or yest <= 0:
                  continue
              pct = (yest - today) / yest * 100
              since = prev_date(series)
              if did in watched and pct >= wthresh:
                  watched_drops.append({"id": did, "name": name_of(did), "set": set_of(did),
                                        "before": yest, "after": today, "pct": pct, "since": since})
              elif pct >= gthresh:
                  global_drops.append({"id": did, "name": name_of(did), "set": set_of(did),
                                       "before": yest, "after": today, "pct": pct, "since": since})

          global_drops.sort(key=lambda x: -x["pct"])
          watched_drops.sort(key=lambda x: -x["pct"])
          target_hits.sort(key=lambda x: x["price"] - x["target"])

          total = len(global_drops) + len(watched_drops) + len(target_hits)
          if total == 0:
              print("Nothing to alert.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as gh:
                  gh.write("found=0\n")
              sys.exit(0)

          sections = []
          if target_hits:
              rows = "\n".join(f"- 🎯 **{d['name']}** ({d['set']}) hit your target: **${d['price']:.2f}** (target ${d['target']:.2f})" for d in target_hits)
              sections.append("### Price targets reached\n" + rows)
          def _since(d): return f" since {d['since']}" if d.get("since") else ""
          if watched_drops:
              rows = "\n".join(f"- ⭐ **{d['name']}** ({d['set']}) — ${d['before']:.2f} → **${d['after']:.2f}** ({d['pct']:.0f}% down{_since(d)})" for d in watched_drops)
              sections.append("### Watched decks dropping\n" + rows)
          if global_drops:
              rows = "\n".join(f"- **{d['name']}** ({d['set']}) — ${d['before']:.2f} → **${d['after']:.2f}** ({d['pct']:.0f}% down{_since(d)})" for d in global_drops)
              sections.append(f"### Other decks down >{int(gthresh)}%\n" + rows)

          body = "\n\n".join(sections) + "\n\n_Auto-generated by deal-alerts.yml_"
          # Title leads with the most personal signal.
          if target_hits:
              title = f"🎯 {len(target_hits)} price target{'s' if len(target_hits)!=1 else ''} hit"
          elif watched_drops:
              title = f"⭐ {len(watched_drops)} watched deck{'s' if len(watched_drops)!=1 else ''} dropping"
          else:
              title = f"Price drops · {len(global_drops)} deck{'s' if len(global_drops)!=1 else ''}"

          print(f"target_hits={len(target_hits)} watched_drops={len(watched_drops)} global_drops={len(global_drops)}")
          with open("alert_body.md", "w") as f:
              f.write(body)
          with open(os.environ["GITHUB_OUTPUT"], "a") as gh:
              gh.write(f"found={total}\n")
              gh.write(f"title={title}\n")
          PY

      - name: Open or update GitHub Issue
        if: steps.detect.outputs.found != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Dedup: reuse the most recent open deal-alert issue (comment on it)
          # instead of spawning a new one every run, to avoid notification noise.
          existing=$(gh issue list --label deal-alert --state open --limit 1 --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body-file alert_body.md
            gh issue edit "$existing" --title "${{ steps.detect.outputs.title }}"
          else
            gh issue create \
              --title "${{ steps.detect.outputs.title }}" \
              --body-file alert_body.md \
              --label deal-alert
          fi

      - name: Discord webhook (optional)
        if: steps.detect.outputs.found != '0' && env.DISCORD_WEBHOOK_URL != ''
        run: |
          BODY=$(jq -Rs '{content: .}' < alert_body.md)
          curl -fsS -X POST -H "Content-Type: application/json" -d "$BODY" "$DISCORD_WEBHOOK_URL"
