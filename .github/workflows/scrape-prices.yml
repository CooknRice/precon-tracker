name: Scrape precon prices
# Add scraper workflow
# Runs every day at 13:00 UTC (6 AM Pacific) and on manual trigger.
on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch: {}

# Allow committing prices.json back to the repo.
permissions:
  contents: write

# Opt into Node.js 24 for reusable actions (checkout, setup-python, etc.)
# ahead of GitHub's June 2026 deprecation of Node 20. Safe to remove once
# Node 24 becomes the runner default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# Queue (don't cancel) so a manual run can't race a scheduled run on the
# commit/push of prices.json.
concurrency:
  group: scrape-prices
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Validate decks.json against schema
        run: |
          python - <<'PY'
          import json, jsonschema
          schema = json.load(open("decks.schema.json"))
          data = json.load(open("decks.json"))
          jsonschema.validate(data, schema)
          ids = [x["id"] for x in data]
          assert len(ids) == len(set(ids)), "duplicate deck ids"
          print(f"decks.json OK: {len(data)} decks, schema valid")
          PY

      - name: Run scraper
        run: python scrape_prices.py

      - name: Validate prices.json
        # Refuse to commit a corrupt or partial scrape. Phases 3/4 (crack/boxes)
        # are non-fatal in the scraper, so guard their output here too: a run
        # that silently wipes singles or box pricing must not overwrite good data.
        run: |
          python - <<'PY'
          import json, jsonschema
          data = json.load(open("prices.json"))
          jsonschema.validate(data, json.load(open("prices.schema.json")))
          assert "vendors" in data and "tcgplayer" in data["vendors"], "missing tcgplayer vendor"
          tcg = data["vendors"]["tcgplayer"]
          hits = sum(1 for v in tcg.values() if v.get("price") is not None)
          # Floors set with headroom under steady state (~103 TCG / ~104 CK /
          # 111 crack / 25 boxes) so a partial regression is caught, not just a
          # total outage. Card Kingdom is now a tracked vendor — guard it too.
          assert hits > 90, f"only {hits} TCG hits — refusing to commit a likely-broken scrape"
          ck = data["vendors"].get("cardkingdom", {})
          ck_hits = sum(1 for v in ck.values() if v.get("price") is not None)
          assert ck_hits > 50, f"only {ck_hits} Card Kingdom hits — CK pricing likely broke"
          crack = data.get("crack", {})
          assert len(crack) > 95, f"only {len(crack)} crack entries — singles pricing likely broke"
          boxes = data.get("boxes", {})
          assert len(boxes) > 18, f"only {len(boxes)} box sets — box pricing likely broke"
          import os
          assert os.path.exists("cards_index.json"), "cards_index.json missing"
          ci = json.load(open("cards_index.json")).get("cards", {})
          assert len(ci) > 1000, f"only {len(ci)} cards in index — reverse index likely broke"
          print(f"prices.json OK: {hits} TCG, {ck_hits} CK, {len(crack)} crack, {len(boxes)} boxes, {len(ci)} index cards")
          PY

      - name: Commit updated prices.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add prices.json prices_history.json cards_index.json
          if git diff --staged --quiet; then
            echo "No price changes today."
            exit 0
          fi
          git commit -m "prices: automated update $(date -u +%Y-%m-%d)"
          # Pull any commits that landed during the scrape, then push.
          # Rebase keeps our commit on top; --autostash handles any stray changes.
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "Push attempt $i failed, retrying..."
            sleep 3
          done
          echo "Push failed after 3 attempts"
          exit 1
